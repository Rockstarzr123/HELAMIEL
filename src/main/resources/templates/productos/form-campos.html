<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="campos">
    <input type="hidden" th:field="*{idProducto}"/>

    <div class="mb-3">
        <label class="form-label">Nombre del producto <span class="text-danger">*</span></label>
        <input type="text" th:field="*{nombre}" class="form-control" required minlength="3" maxlength="100"
               th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
               placeholder="Ej: Helado de Fresa Artesanal">
        <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
    </div>

    <div class="mb-3">
        <label class="form-label">Descripción</label>
        <textarea th:field="*{descripcion}" class="form-control" rows="2" maxlength="255"
                  th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid'"
                  placeholder="Ingredientes, presentación, notas..."></textarea>
        <div class="invalid-feedback" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></div>
    </div>

    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label">Categoría <span class="text-danger">*</span></label>
            <input type="text" th:field="*{categoria}" class="form-control" required minlength="3" maxlength="60"
                   th:classappend="${#fields.hasErrors('categoria')} ? 'is-invalid'"
                   placeholder="Ej: Helados, Toppings, Bebidas" list="listaCategorias">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}"></div>
        </div>
        <div class="col-md-3">
            <label class="form-label">Precio (COP) <span class="text-danger">*</span></label>
            <input type="number" th:field="*{precio}" class="form-control" required min="0.01" step="0.01"
                   th:classappend="${#fields.hasErrors('precio')} ? 'is-invalid'" placeholder="0.00">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}"></div>
        </div>
        <div class="col-md-3">
            <label class="form-label">Stock <span class="text-danger">*</span></label>
            <input type="number" th:field="*{stock}" class="form-control" required min="0" step="1"
                   th:classappend="${#fields.hasErrors('stock')} ? 'is-invalid'" placeholder="0">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></div>
        </div>
    </div>

    <div class="form-check form-switch mt-3">
        <input class="form-check-input" type="checkbox" role="switch" th:field="*{estado}">
        <label class="form-check-label" th:for="${#ids.prev('estado')}">Producto activo</label>
    </div>

    <datalist id="listaCategorias">
        <option th:each="cat : ${categorias}" th:value="${cat}"></option>
    </datalist>
</th:block>
</body>
</html>
