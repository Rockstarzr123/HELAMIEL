<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar sesion - HELAMIEL</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div class="d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-sm" style="width: 100%; max-width: 380px;">
        <div class="card-body p-4">

            <div class="text-center mb-4">
                <i class="bi bi-snow2 fs-1 text-primary"></i>
                <h4 class="mt-2 mb-0">HELAMIEL</h4>
                <p class="text-muted small">Panel administrativo</p>
            </div>

            <div class="alert alert-danger py-2" th:if="${mensajeError}" th:text="${mensajeError}"></div>

            <form th:action="@{/login}" th:object="${loginRequest}" method="post">
                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text" class="form-control" th:field="*{usuario}" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contrasena</label>
                    <input type="password" class="form-control" th:field="*{password}" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right"></i> Ingresar
                </button>
            </form>

        </div>
    </div>
</div>

</body>
</html>
