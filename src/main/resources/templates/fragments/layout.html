<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title th:text="${titulo}">HELAMIEL</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<!-- ============================================
     NAVBAR superior
     ============================================ -->
<nav class="admin-topbar" th:fragment="navbar">
    <button class="btn-icon d-lg-none" id="btnSidebarToggle" type="button" aria-label="Abrir menu">
        <i class="bi bi-list"></i>
    </button>

    <a class="topbar-brand" th:href="@{/productos}">
        <span class="topbar-brand-icon"><i class="bi bi-cup-hot-fill"></i></span>
        <span class="topbar-brand-text">HELAMIEL</span>
    </a>

    <div class="topbar-spacer"></div>

    <div class="topbar-user">
        <span class="topbar-user-name"><i class="bi bi-person-circle"></i>
            <span th:text="${session.usuarioLogueado} ?: 'Administrador'">Administrador</span>
        </span>
        <a th:href="@{/logout}" class="btn-icon" title="Cerrar sesion">
            <i class="bi bi-box-arrow-right"></i>
        </a>
    </div>
</nav>

<!-- ============================================
     SIDEBAR lateral
     ============================================ -->
<aside class="admin-sidebar" id="adminSidebar" th:fragment="sidebar(activo)">
    <div class="sidebar-header">
        <span class="sidebar-logo"><i class="bi bi-snow2"></i></span>
        <div>
            <p class="sidebar-title">Helamiel</p>
            <p class="sidebar-subtitle">Panel administrativo</p>
        </div>
    </div>

    <ul class="sidebar-menu">
        <li>
            <a th:href="@{/}" th:classappend="${activo == 'inicio'} ? 'active'">
                <i class="bi bi-signpost-2"></i> <span>Rutas</span>
            </a>
        </li>
        <li>
            <a th:href="@{/productos}" th:classappend="${activo == 'productos'} ? 'active'">
                <i class="bi bi-box-seam"></i> <span>Productos</span>
            </a>
        </li>
    </ul>

    <div class="sidebar-footer-note">
        <i class="bi bi-mortarboard-fill"></i>
        <span>Proyecto formativo SENA</span>
    </div>
</aside>

<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<!-- ============================================
     FOOTER
     ============================================ -->
<footer class="admin-footer" th:fragment="footer">
    <p>&copy; <span th:text="${#temporals.year(#temporals.createNow())}">2026</span> HELAMIEL — Heladería Artesanal. Proyecto formativo SENA, GA7-220501096-AA4-EV03.</p>
</footer>
</html>
