spring.application.name=helamiel
server.port=9090

# ------------------------------------------------------------
# Conexion a MySQL (base de datos real del proyecto HELAMIEL)
# Las credenciales se toman de variables de entorno para no
# exponer contrasenas en el repositorio. Los valores despues
# de ":" son solo defaults de desarrollo local.
# ------------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
server.error.include-message=always
server.error.include-stacktrace=always
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Thymeleaf: desactivar cache en desarrollo para ver cambios sin recompilar.
spring.thymeleaf.cache=false