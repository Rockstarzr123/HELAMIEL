spring.application.name=helamiel
server.port=9090

# ------------------------------------------------------------
# Conexion a MySQL (base de datos real del proyecto HELAMIEL)
# Las credenciales se toman de variables de entorno para no
# exponer contrasenas en el repositorio. Los valores despues
# de ":" son solo defaults de desarrollo local.
# ------------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/helamiel?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
server.error.include-message=always
server.error.include-stacktrace=always
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Thymeleaf: desactivar cache en desarrollo para ver cambios sin recompilar.
spring.thymeleaf.cache=false
